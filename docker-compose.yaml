services:
  claude-dev:
    build: .
    image: claude-devcontainer:latest
    container_name: ${CONTAINER_NAME:-claude-dev}
    labels:
      com.claude-dev.session: "true"
    env_file:
      - path: .env
        required: false
    environment:
      # CLI-driven vars (set by claude-dev wrapper, not .env)
      - MODE=${MODE:-develop}
      - SESSION_NAME=${SESSION_NAME:-default}
      - CONTAINER_NAME=${CONTAINER_NAME:-claude-dev}
      - PR_NUMBER
      - PR_REPO
      - DRY_RUN
      - SKIP_PERMISSIONS
    volumes:
      # Host Anthropic config (staged, then copied+modified by entrypoint)
      - ${HOME}/.claude.json:/tmp/.claude.json.host:ro
      # Host Claude settings (contains auth tokens, base URL, model config)
      - ${HOME}/.claude/settings.json:/tmp/.claude.settings.host:ro
      # Host-provided CLAUDE.md, agents, skills, settings
      - ./host-config:/host-config:ro
      # Persistent workspace for cloned repos
      - workspace:/workspace
      # Config files (workspace.yaml, mode configs)
      - ./config:/etc/claude-dev/config:ro
      # Custom CA certificates (optional)
      - ./certs:/etc/claude-dev/certs:ro
    stdin_open: true
    tty: true
    mem_limit: 4g
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  workspace:
    name: ${VOLUME_NAME:-claude-dev-workspace}
